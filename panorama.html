<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Haptic Panorama</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 20px; }

  #viewfinder {
    width: 100%;
    max-width: 420px;
    aspect-ratio: 4/3;
    background: #1a1a1a;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    border: 1px solid #333;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  #status {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 13px;
    padding: 4px 14px;
    border-radius: 20px;
    white-space: nowrap;
  }
  #flash {
    position: absolute; inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.08s;
  }
  #dots {
    position: absolute;
    bottom: 12px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: background 0.2s;
  }
  .dot.done { background: #fff; }
  .dot.active { background: #ffcc00; }

  #allow-btn {
    margin-top: 16px;
    width: 100%; max-width: 420px;
    padding: 16px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  #allow-btn:active { opacity: 0.85; }

  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
    width: 100%; max-width: 420px;
  }
  .row label { font-size: 13px; color: #888; flex-shrink: 0; }
  .row input[type=range] { flex: 1; accent-color: #fff; }
  .row span { font-size: 14px; font-weight: 600; min-width: 16px; }

  #capture-btn {
    margin-top: 16px;
    width: 72px; height: 72px;
    border-radius: 50%;
    background: #fff;
    border: 4px solid #555;
    font-size: 28px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s;
  }
  #capture-btn:active { transform: scale(0.92); }
  #capture-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  #instruction {
    margin-top: 12px;
    font-size: 12px;
    color: #666;
    text-align: center;
    max-width: 320px;
    line-height: 1.6;
  }

  #thumbs {
    display: flex; gap: 8px;
    margin-top: 16px;
    overflow-x: auto;
    width: 100%; max-width: 420px;
    padding: 4px 0;
  }
  .thumb {
    flex-shrink: 0;
    height: 64px;
    border-radius: 8px;
    border: 1px solid #333;
  }

  #result-section {
    display: none;
    margin-top: 20px;
    width: 100%; max-width: 420px;
  }
  #result-label { font-size: 13px; color: #888; margin-bottom: 8px; }
  #result-wrap {
    width: 100%;
    overflow-x: auto;
    border-radius: 10px;
    background: #111;
    border: 1px solid #333;
  }
  #result-canvas {
    display: block;
    height: 120px;
    width: auto;
  }
  #save-btn {
    margin-top: 12px;
    width: 100%;
    padding: 14px;
    background: #1a1a1a;
    color: #fff;
    border: 1px solid #333;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
  }
  #save-btn:active { background: #2a2a2a; }

  #error-msg {
    display: none;
    margin-top: 12px;
    background: #1a0000;
    border: 1px solid #500;
    color: #f88;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    width: 100%; max-width: 420px;
  }
</style>
</head>
<body>

<h1>Haptic Panorama</h1>
<p class="sub">Vibrate. Shift. Stitch.</p>

<div id="viewfinder">
  <video id="video" autoplay playsinline muted></video>
  <div id="flash"></div>
  <div id="status">Tap "Allow Camera" below</div>
  <div id="dots"></div>
</div>

<div id="error-msg"></div>

<button id="allow-btn">Allow Camera &amp; Start</button>

<div class="row">
  <label>Frames</label>
  <input type="range" id="frame-slider" min="2" max="6" value="3" step="1">
  <span id="frame-val">3</span>
</div>

<button id="capture-btn" disabled>📷</button>

<p id="instruction">Place phone flat on a smooth desk. Tap 📷 to start — the phone vibrates between each shot to shift position, then stitches into a panorama.</p>

<div id="thumbs"></div>

<div id="result-section">
  <p id="result-label">Your panorama</p>
  <div id="result-wrap">
    <canvas id="result-canvas"></canvas>
  </div>
  <button id="save-btn">⬇ Save panorama</button>
</div>

<script>
const video = document.getElementById('video');
const allowBtn = document.getElementById('allow-btn');
const captureBtn = document.getElementById('capture-btn');
const statusEl = document.getElementById('status');
const flashEl = document.getElementById('flash');
const dotsEl = document.getElementById('dots');
const frameSlider = document.getElementById('frame-slider');
const frameVal = document.getElementById('frame-val');
const thumbsEl = document.getElementById('thumbs');
const resultSection = document.getElementById('result-section');
const resultCanvas = document.getElementById('result-canvas');
const saveBtn = document.getElementById('save-btn');
const errorMsg = document.getElementById('error-msg');

let stream = null;
let frames = [];
let totalFrames = 3;
let capturing = false;

function buildDots() {
  dotsEl.innerHTML = '';
  for (let i = 0; i < totalFrames; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot' + i;
    dotsEl.appendChild(d);
  }
}
buildDots();

frameSlider.addEventListener('input', () => {
  totalFrames = parseInt(frameSlider.value);
  frameVal.textContent = totalFrames;
  buildDots();
});

allowBtn.addEventListener('click', async () => {
  errorMsg.style.display = 'none';
  statusEl.textContent = 'Requesting camera…';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    statusEl.textContent = 'Camera ready ✓';
    allowBtn.style.display = 'none';
    captureBtn.disabled = false;
  } catch (err) {
    statusEl.textContent = 'Camera denied';
    errorMsg.style.display = 'block';
    errorMsg.innerHTML = '<strong>Camera access failed.</strong><br><br>'
      + 'Try this:<br>'
      + '1. Make sure you opened this file in <strong>Chrome</strong><br>'
      + '2. Look for a camera icon in the address bar and tap <strong>Allow</strong><br>'
      + '3. If on iPhone, go to Settings → Chrome → Camera → Allow<br>'
      + '4. If on Android, go to Settings → Apps → Chrome → Permissions → Camera → Allow<br><br>'
      + 'Error: ' + err.message;
  }
});

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function snapFrame() {
  const c = document.createElement('canvas');
  c.width = video.videoWidth || 640;
  c.height = video.videoHeight || 480;
  c.getContext('2d').drawImage(video, 0, 0, c.width, c.height);
  return c;
}

function flash() {
  flashEl.style.opacity = '0.9';
  setTimeout(() => flashEl.style.opacity = '0', 100);
}

function vibrate(pattern) {
  if ('vibrate' in navigator) navigator.vibrate(pattern);
}

async function runCapture() {
  capturing = true;
  captureBtn.disabled = true;
  frameSlider.disabled = true;
  frames = [];
  thumbsEl.innerHTML = '';
  resultSection.style.display = 'none';
  buildDots();

  for (let i = 0; i < totalFrames; i++) {
    const dot = document.getElementById('dot' + i);
    if (dot) dot.classList.add('active');

    if (i === 0) {
      statusEl.textContent = 'Capturing shot 1…';
      vibrate([50]);
    } else {
      statusEl.textContent = 'Vibrating to shift…';
      vibrate([100, 50, 100, 50, 150]);
      await sleep(600);
      statusEl.textContent = `Capturing shot ${i + 1}…`;
    }

    await sleep(400);
    flash();
    const frame = snapFrame();
    frames.push(frame);

    if (dot) { dot.classList.remove('active'); dot.classList.add('done'); }

    const thumb = document.createElement('canvas');
    thumb.className = 'thumb';
    const s = 64 / frame.height;
    thumb.height = 64;
    thumb.width = Math.round(frame.width * s);
    thumb.getContext('2d').drawImage(frame, 0, 0, thumb.width, 64);
    thumbsEl.appendChild(thumb);

    if (i < totalFrames - 1) await sleep(300);
  }

  statusEl.textContent = 'Stitching…';
  await sleep(200);
  stitch();

  capturing = false;
  captureBtn.disabled = false;
  frameSlider.disabled = false;
  statusEl.textContent = 'Done! Scroll down ↓';
}

function stitch() {
  if (!frames.length) return;
  const fw = frames[0].width;
  const fh = frames[0].height;
  const slice = Math.round(fw * 0.65);
  const totalW = slice * (frames.length - 1) + fw;

  resultCanvas.width = totalW;
  resultCanvas.height = fh;
  const ctx = resultCanvas.getContext('2d');

  frames.forEach((f, i) => {
    const x = i * slice;
    ctx.save();
    ctx.beginPath();
    if (i < frames.length - 1) {
      ctx.rect(x, 0, slice + fw * 0.12, fh);
    } else {
      ctx.rect(x, 0, fw, fh);
    }
    ctx.clip();
    ctx.drawImage(f, x, 0);
    ctx.restore();
  });

  const dh = 120;
  const dw = Math.round(totalW * (dh / fh));
  resultCanvas.style.height = dh + 'px';
  resultCanvas.style.width = dw + 'px';

  resultSection.style.display = 'block';
  resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

captureBtn.addEventListener('click', () => {
  if (!capturing) runCapture();
});

saveBtn.addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'panorama.jpg';
  a.href = resultCanvas.toDataURL('image/jpeg', 0.92);
  a.click();
});
</script>
</body>
</html>
